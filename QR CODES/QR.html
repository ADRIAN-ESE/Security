<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .input-field {
            transition: all 0.3s ease;
        }

        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .color-picker-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-picker-wrapper:hover {
            transform: scale(1.05);
        }

        .color-picker-wrapper input[type="color"] {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            cursor: pointer;
        }

        #qrcode {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        #qrcode.show {
            opacity: 1;
            transform: scale(1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .pattern-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0);
            background-size: 20px 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        .size-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            outline: none;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .size-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 50;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="pattern-bg flex items-center justify-center p-4">
    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- Input Section -->
        <div class="glass-panel rounded-3xl p-8 floating">
            <div class="mb-6">
                <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-blue-600 mb-2">
                    QR Code Studio
                </h1>
                <p class="text-gray-600">Create beautiful, customized QR codes instantly</p>
            </div>

            <div class="space-y-6">
                <!-- Text Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Content</label>
                    <textarea 
                        id="qr-text" 
                        placeholder="Enter URL, text, or any data..." 
                        class="input-field w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none resize-none h-32 text-gray-700"
                    ></textarea>
                </div>

                <!-- Customization Options -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Foreground Color</label>
                        <div class="color-picker-wrapper h-12 bg-gray-100 border-2 border-gray-200 rounded-xl flex items-center px-4">
                            <div id="fg-color-preview" class="w-6 h-6 rounded-full bg-black mr-3 border-2 border-gray-300"></div>
                            <span class="text-sm text-gray-600 font-mono" id="fg-color-text">#000000</span>
                            <input type="color" id="fg-color" value="#000000" class="opacity-0">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Background Color</label>
                        <div class="color-picker-wrapper h-12 bg-gray-100 border-2 border-gray-200 rounded-xl flex items-center px-4">
                            <div id="bg-color-preview" class="w-6 h-6 rounded-full bg-white mr-3 border-2 border-gray-300"></div>
                            <span class="text-sm text-gray-600 font-mono" id="bg-color-text">#FFFFFF</span>
                            <input type="color" id="bg-color" value="#ffffff" class="opacity-0">
                        </div>
                    </div>
                </div>

                <!-- Size Slider -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2 flex justify-between">
                        <span>Size</span>
                        <span id="size-value" class="text-purple-600">256px</span>
                    </label>
                    <input 
                        type="range" 
                        id="size-slider" 
                        min="128" 
                        max="512" 
                        value="256" 
                        class="size-slider w-full"
                    >
                </div>

                <!-- Error Correction -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Error Correction Level</label>
                    <select id="error-level" class="input-field w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none bg-white text-gray-700">
                        <option value="1">Low (L) - 7%</option>
                        <option value="0">Medium (M) - 15%</option>
                        <option value="3" selected>Quartile (Q) - 25%</option>
                        <option value="2">High (H) - 30%</option>
                    </select>
                </div>

                <!-- Generate Button -->
                <button 
                    onclick="generateQR()" 
                    class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Generate QR Code
                </button>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="glass-panel rounded-3xl p-8 flex flex-col items-center justify-center min-h-[600px] relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-purple-50 to-blue-50 opacity-50"></div>
            
            <div class="relative z-10 text-center w-full">
                <h2 class="text-2xl font-bold text-gray-800 mb-8">Preview</h2>
                
                <div id="qrcode-container" class="bg-white p-8 rounded-2xl shadow-2xl inline-block mb-8 transform transition-all duration-300 hover:scale-105">
                    <div id="qrcode"></div>
                </div>

                <div id="placeholder" class="text-gray-400 flex flex-col items-center justify-center h-64">
                    <svg class="w-24 h-24 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v1m6 11h2m-6 0h-2v4h2v-4zM6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p class="text-lg">Enter content to generate QR code</p>
                </div>

                <!-- Download Options -->
                <div id="download-section" class="hidden space-y-3 w-full max-w-xs mx-auto">
                    <button 
                        onclick="downloadQR('png')" 
                        class="w-full py-3 px-6 bg-gray-800 text-white rounded-xl font-semibold hover:bg-gray-900 transition-all flex items-center justify-center gap-2 shadow-lg"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        Download PNG
                    </button>
                    <div class="flex gap-3">
                        <button 
                            onclick="downloadQR('jpg')" 
                            class="flex-1 py-2 px-4 bg-gray-200 text-gray-700 rounded-xl font-medium hover:bg-gray-300 transition-all text-sm"
                        >
                            JPG
                        </button>
                        <button 
                            onclick="downloadQR('webp')" 
                            class="flex-1 py-2 px-4 bg-gray-200 text-gray-700 rounded-xl font-medium hover:bg-gray-300 transition-all text-sm"
                        >
                            WebP
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <span id="toast-message">QR Code downloaded!</span>
        </div>
    </div>

    <script>
        let currentQR = null;

        // Color picker handlers
        document.getElementById('fg-color').addEventListener('input', function(e) {
            document.getElementById('fg-color-preview').style.backgroundColor = e.target.value;
            document.getElementById('fg-color-text').textContent = e.target.value.toUpperCase();
        });

        document.getElementById('bg-color').addEventListener('input', function(e) {
            document.getElementById('bg-color-preview').style.backgroundColor = e.target.value;
            document.getElementById('bg-color-text').textContent = e.target.value.toUpperCase();
        });

        // Size slider handler
        document.getElementById('size-slider').addEventListener('input', function(e) {
            document.getElementById('size-value').textContent = e.target.value + 'px';
        });

        function generateQR() {
            const text = document.getElementById('qr-text').value.trim();
            if (!text) {
                showToast('Please enter some content first!', 'error');
                document.getElementById('qr-text').focus();
                return;
            }

            const container = document.getElementById('qrcode');
            const placeholder = document.getElementById('placeholder');
            const downloadSection = document.getElementById('download-section');
            
            // Clear previous QR
            container.innerHTML = '';
            
            const size = parseInt(document.getElementById('size-slider').value);
            const fgColor = document.getElementById('fg-color').value;
            const bgColor = document.getElementById('bg-color').value;
            const errorLevel = parseInt(document.getElementById('error-level').value);

            // Generate new QR
            currentQR = new QRCode(container, {
                text: text,
                width: size,
                height: size,
                colorDark: fgColor,
                colorLight: bgColor,
                correctLevel: errorLevel
            });

            // Show QR with animation
            placeholder.style.display = 'none';
            container.classList.remove('show');
            downloadSection.classList.remove('hidden');
            
            setTimeout(() => {
                container.classList.add('show');
            }, 100);

            showToast('QR Code generated successfully!');
        }

        function downloadQR(format) {
            const container = document.getElementById('qrcode');
            const img = container.querySelector('img');
            
            if (!img) {
                showToast('Generate a QR code first!', 'error');
                return;
            }

            // Create canvas to handle format conversion
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;

            // Fill background if not PNG (to handle transparency)
            if (format !== 'png') {
                ctx.fillStyle = document.getElementById('bg-color').value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.drawImage(img, 0, 0);

            // Download
            const link = document.createElement('a');
            link.download = `qrcode-${Date.now()}.${format}`;
            link.href = canvas.toDataURL(`image/${format}`, 0.9);
            link.click();

            showToast(`Downloaded as ${format.toUpperCase()}`);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            
            toastMessage.textContent = message;
            toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Generate on Enter key
        document.getElementById('qr-text').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQR();
            }
        });
    </script>
</body>
</html>
